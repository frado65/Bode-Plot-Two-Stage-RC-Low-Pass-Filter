<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Mia Pagina Interattiva</title>
    <style>
        /* --- STILE CSS --- */
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --text: #1f2937;
            --text-light: #6b7280;
            --border: #e5e7eb;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 450px;
            transition: transform 0.3s ease;
        }

        h1 {
            font-size: 1.8rem;
            margin-top: 0;
            color: var(--primary);
            text-align: center;
        }

        p.subtitle {
            color: var(--text-light);
            text-align: center;
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        /* Barra di progresso */
        .progress-container {
            background: var(--border);
            border-radius: 8px;
            height: 10px;
            width: 100%;
            margin-bottom: 1.5rem;
            overflow: hidden;
        }

        .progress-bar {
            background: var(--primary);
            height: 100%;
            width: 0%;
            transition: width 0.4s ease;
        }

        /* Form di inserimento */
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 1.5rem;
        }

        input[type="text"] {
            flex: 1;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.25rem;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }

        button:hover {
            background: var(--primary-hover);
        }

        /* Lista degli elementi */
        ul {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 250px;
            overflow-y: auto;
        }

        li {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem;
            border-bottom: 1px solid var(--border);
            animation: fadeIn 0.3s ease;
        }

        li:last-child {
            border-bottom: none;
        }

        .task-text {
            cursor: pointer;
            flex: 1;
            margin-left: 10px;
            transition: all 0.2s;
        }

        .completed .task-text {
            text-decoration: line-through;
            color: var(--text-light);
        }

        .delete-btn {
            background: transparent;
            color: #ef4444;
            padding: 4px 8px;
            font-size: 0.85rem;
        }
        .delete-btn:hover {
            background: #fee2e2;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>I Miei Obiettivi</h1>
        <p class="subtitle">Aggiungi elementi e cliccaci sopra per completarli</p>

        <!-- Barra di progresso interattiva -->
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <!-- Input per nuovi elementi -->
        <div class="input-group">
            <input type="text" id="taskInput" placeholder="Cosa devi fare oggi?">
            <button id="addBtn">Aggiungi</button>
        </div>

        <!-- Lista dinamica -->
        <ul id="taskList"></ul>
    </div>

    <script>
        // --- LOGICA JAVASCRIPT ---
        const taskInput = document.getElementById('taskInput');
        const addBtn = document.getElementById('addBtn');
        const taskList = document.getElementById('taskList');
        const progressBar = document.getElementById('progressBar');

        let tasks = [];

        // Funzione per aggiornare l'interfaccia e la barra di progresso
        function updateUI() {
            taskList.innerHTML = '';
            
            if (tasks.length === 0) {
                progressBar.style.width = '0%';
                return;
            }

            tasks.forEach((task, index) => {
                const li = document.createElement('li');
                if (task.completed) li.classList.add('completed');

                li.innerHTML = `
                    <input type="checkbox" ${task.completed ? 'checked' : ''} onchange="toggleTask(${index})">
                    <span class="task-text" onclick="toggleTask(${index})">${task.text}</span>
                    <button class="delete-btn" onclick="deleteTask(${index})">Elimina</button>
                `;
                taskList.appendChild(li);
            });

            // Calcolo percentuale progresso
            const completedCount = tasks.filter(t => t.completed).length;
            const percentage = (completedCount / tasks.length) * 100;
            progressBar.style.width = `${percentage}%`;
        }

        // Aggiungere un task
        function addTask() {
            const text = taskInput.value.trim();
            if (text !== '') {
                tasks.push({ text: text, completed: false });
                taskInput.value = '';
                updateUI();
            }
        }

        // Invertire lo stato del task (completato / non completato)
        function toggleTask(index) {
            tasks[index].completed = !tasks[index].completed;
            updateUI();
        }

        // Eliminare un task
        function deleteTask(index) {
            tasks.splice(index, 1);
            updateUI();
        }

        // Event Listeners per i pulsanti e il tasto Invio
        addBtn.addEventListener('click', addTask);
        taskInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') addTask();
        });

        // Inizializzazione con due task di esempio
        tasks.push({ text: "Esplorare GitHub Pages", completed: true });
        tasks.push({ text: "Creare qualcosa di fantastico", completed: false });
        updateUI();
    </script>
</body>
</html>
