<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bode Plot - Two-Stage RC Low-Pass Filter</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #121214;
            --card: #1a1a1e;
            --text: #e1e1e6;
            --accent: #00b4d8;
            --border: #29292e;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            width: 100%;
            max-width: 900px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
        }
        h1 { margin-top: 0; color: var(--accent); font-size: 1.6rem; text-align: center; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .input-group {
            display: flex;
            flex-direction: column;
        }
        label { font-size: 0.85rem; color: #a4a4a8; margin-bottom: 6px; }
        input {
            background: #202024;
            border: 1px solid var(--border);
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 1rem;
        }
        input:focus { border-color: var(--accent); outline: none; }
        .chart-container {
            position: relative;
            margin-bottom: 20px;
            height: 400px;
            width: 100%;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Two-Stage RC Low-Pass Filter Bode Plot</h1>
    
    <div class="grid">
        <div class="input-group">
            <label>R1 (Ω)</label>
            <input type="number" id="r1" value="1000" oninput="updatePlot()">
        </div>
        <div class="input-group">
            <label>C1 (µF)</label>
            <input type="number" id="c1" value="0.1" step="0.01" oninput="updatePlot()">
        </div>
        <div class="input-group">
            <label>R2 (Ω)</label>
            <input type="number" id="r2" value="1000" oninput="updatePlot()">
        </div>
        <div class="input-group">
            <label>C2 (µF)</label>
            <input type="number" id="c2" value="0.1" step="0.01" oninput="updatePlot()">
        </div>
    </div>

    <div class="chart-container">
        <canvas id="bodeChart"></canvas>
    </div>
</div>

<script>
    let chart;

    function calculateBode() {
        const R1 = parseFloat(document.getElementById('r1').value);
        const C1 = parseFloat(document.getElementById('c1').value) * 1e-6;
        const R2 = parseFloat(document.getElementById('r2').value);
        const C2 = parseFloat(document.getElementById('c2').value) * 1e-6;

        const dataPoints = [];
        for (let i = 1; i <= 6; i += 0.05) {
            const freq = Math.pow(10, i);
            const w = 2 * Math.PI * freq;

            const real = 1 - w*w * R1 * C1 * R2 * C2;
            const imag = w * (R1 * C1 + R2 * C2 + R1 * C2);
            const denomMag2 = real*real + imag*imag;

            const mag = 1 / Math.sqrt(denomMag2);
            const db = 20 * Math.log10(mag);

            dataPoints.push({ x: freq, y: db });
        }
        return dataPoints;
    }

    function updatePlot() {
        const data = calculateBode();
        chart.data.datasets[0].data = data;
        chart.update();
    }

    const ctx = document.getElementById('bodeChart').getContext('2d');
    chart = new Chart(ctx, {
        type: 'line',
        data: {
            datasets: [{
                label: 'Magnitudo (dB)',
                data: calculateBode(),
                borderColor: '#00b4d8',
                borderWidth: 2,
                pointRadius: 0,
                fill: false
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                x: {
                    type: 'logarithmic',
                    title: { display: true, text: 'Frequenza (Hz)', color: '#a4a4a8' },
                    ticks: {
                        color: '#a4a4a8',
                        callback: function(value) {
                            if ([10, 100, 1000, 10000, 100000, 1000000].includes(value)) {
                                return value >= 1000 ? (value/1000) + 'k' : value;
                            }
                        }
                    },
                    grid: { color: '#29292e' }
                },
                y: {
                    title: { display: true, text: 'Guadagno (dB)', color: '#a4a4a8' },
                    ticks: { color: '#a4a4a8' },
                    grid: { color: '#29292e' }
                }
            },
            plugins: {
                legend: { display: false }
            }
        }
    });
</script>

</body>
</html>
